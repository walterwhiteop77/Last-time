services:
  - type: web
    name: tg-automation-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
